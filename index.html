<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- css.style -->
    <link rel="stylesheet" href="style.css">
    <title>Results Box</title>
</head>

<body>
    <div class="container">
        <div class="container w-50 mx-auto ">
            <div class="row">
                <div class="col">
                    <div class="card mt-5 shadow bg-dark-subtle">
                        <div class="card-body">
                            <div class="bg-secondary rounded">
                                <h3 class="text-center text-black  rounded mt-3"> Your Results Check</h3>
                            </div>
            <div class="form-group ">
                                <input id="Number" type="number" placeholder="Enter Your Exam Score "
                                    class="form-control mt-3">
                            </div>
                            <div class="form-group text-center ">
                                <button onclick="data()" class="btn btn-primary btn-sm mt-3">Check Data</button>
                                <div id="outputdata" class="alert alert-danger mt-3 text-center mb-2" role="alert ">
                                    Waiting for results
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>







    <!-- Bootstrap.cdn -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>


</html>
